    function selectCity(city) {
        if (window.Android) {
            window.Android.onCitySelected(city.name, city.tz);
        }
    }

        const world = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://raw.githubusercontent.com/vasturiano/three-globe/master/example/img/earth-blue-marble.jpg')
            .backgroundColor('#ffffff')

            .pointsData(cities)
            .pointLat('lat')
            .pointLng('lng')
            .pointColor(() => '#ff0000')
            .pointAltitude(0.01)
            .pointRadius(0.5)
            .onPointClick(selectCity)

            .labelsData(cities)
            .labelLat('lat')
            .labelLng('lng')
            .labelText('name')
            .labelSize(1.1)
            .labelDotRadius(0)
            .labelColor(() => 'rgba(255, 255, 255, 0.8)')
            .labelResolution(2)
            .labelAltitude(0.02)
            .onLabelClick(selectCity);

    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;

</body>
